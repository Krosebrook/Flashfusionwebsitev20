name: PR Governance

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  security-label:
    name: Auto-label security-sensitive PRs
    runs-on: ubuntu-latest
    outputs:
      touches_sensitive_paths: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            src/auth/**
            infra/**
            secrets/**
            middleware/**
            **/.env
            **/.env.*
            terraform/**
            helm/**

      - name: Apply security-review label
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;

            // Ensure the label exists
            try {
              await github.rest.issues.getLabel({ owner, repo, name: 'security-review' });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: 'security-review',
                  color: 'd93f0b',
                  description: 'PR touches security-sensitive paths and requires security review',
                });
              } else {
                throw e;
              }
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: prNumber,
              labels: ['security-review'],
            });

            core.info(`Applied 'security-review' label to PR #${prNumber}`);

  enforce-security-review:
    name: Fail CI if security-review label is missing on sensitive PRs
    runs-on: ubuntu-latest
    needs: security-label
    steps:
      - name: Check for security-review label
        if: needs.security-label.outputs.touches_sensitive_paths == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });

            const hasLabel = pr.labels.some(l => l.name === 'security-review');
            if (!hasLabel) {
              core.setFailed(
                "This PR modifies security-sensitive paths but is missing the 'security-review' label. " +
                "The label should have been applied automatically — if it is missing, add it manually and ensure a security review is completed."
              );
            } else {
              core.info("'security-review' label is present. Proceeding.");
            }

  pr-size-warning:
    name: Warn on large PRs (> 800 lines changed)
    runs-on: ubuntu-latest
    steps:
      - name: Check PR size and post warning
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });

            const additions = pr.additions || 0;
            const deletions = pr.deletions || 0;
            const totalLines = additions + deletions;
            const threshold = 800;

            if (totalLines > threshold) {
              const warningBody =
                `## ⚠️ Large PR Warning\n\n` +
                `This PR changes **${totalLines} lines** (+${additions} / -${deletions}), which exceeds the recommended limit of **${threshold} lines**.\n\n` +
                `Large PRs are harder to review thoroughly and increase the risk of introducing bugs.\n\n` +
                `**Please consider:**\n` +
                `- Splitting this PR into smaller, focused changes\n` +
                `- Ensuring each logical change is independently reviewable\n` +
                `- Confirming that all changed files are intentionally included\n\n` +
                `_This is an automated message from PR Governance._`;

              // Check if a warning comment already exists to avoid duplicates
              const { data: comments } = await github.rest.issues.listComments({
                owner,
                repo,
                issue_number: prNumber,
              });

              const existingWarning = comments.find(c =>
                c.body.includes('Large PR Warning') &&
                c.user.type === 'Bot'
              );

              if (!existingWarning) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: prNumber,
                  body: warningBody,
                });
                core.info(`Posted large-PR warning on PR #${prNumber} (${totalLines} lines changed).`);
              } else {
                core.info('Warning comment already exists — skipping duplicate.');
              }
            } else {
              core.info(`PR size is ${totalLines} lines — within the ${threshold}-line threshold. No warning needed.`);
            }
