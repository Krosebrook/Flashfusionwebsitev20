name: Feature Request
description: Propose a new feature or enhancement for FlashFusion
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please fill in as much detail as possible.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, one-sentence description of the feature you are proposing.
      placeholder: "Add a [feature] so that [benefit]."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What user pain point does it address?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature as you envision it. What would it look and feel like?
    validations:
      required: true

  - type: textarea
    id: user_story
    attributes:
      label: User Story
      placeholder: "As a [role], I want [feature] so that [benefit]."
    validations:
      required: false

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: What conditions must be true for this feature to be considered complete?
      placeholder: |
        - [ ] User can ...
        - [ ] System validates ...
        - [ ] Error state shows ...
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches?
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority Suggestion
      options:
        - "P1 — Must Have (current milestone)"
        - "P2 — Should Have (next milestone)"
        - "P3 — Nice to Have (backlog)"
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: Estimated Effort
      options:
        - "Small (hours)"
        - "Medium (1–3 days)"
        - "Large (1+ week)"
        - "Unknown"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Mockups, links to similar features in other products, related issues, etc.
    validations:
      required: false
