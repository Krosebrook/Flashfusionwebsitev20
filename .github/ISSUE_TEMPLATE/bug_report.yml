name: Bug Report
description: Report a reproducible problem with FlashFusion
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Please provide as much detail as possible to help us reproduce and fix the issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, one-sentence description of the bug.
      placeholder: "When I click X, Y happens instead of Z."
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where does this bug occur?
      options:
        - Production (flashfusion.dev)
        - Staging
        - Local development
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: FlashFusion Version / Commit
      placeholder: "v2.1.0 or commit SHA abc1234"
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: "Chrome 123 on macOS 14"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Detailed steps that reliably reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Enter '...'
        4. Observe '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console Errors / Logs
      description: Paste any relevant browser console errors.
      render: text
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "P0 — Critical: Production down / data loss / security issue"
        - "P1 — High: Major feature broken for many users"
        - "P2 — Medium: Feature degraded, workaround exists"
        - "P3 — Low: Minor UX or cosmetic issue"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, screen recordings, or any other relevant information.
    validations:
      required: false
